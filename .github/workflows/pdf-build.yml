name: Build PDFs

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'tools/_build.py'
      - '.github/workflows/pdf-build.yml'
  pull_request:
    paths:
      - '**.md'
      - 'tools/_build.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install WeasyPrint system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libffi-dev fonts-noto fonts-noto-cjk

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install markdown weasyprint

      - name: Build PDFs
        run: python tools/_build.py

      - name: Upload PDFs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reborn-pdfs
          path: PDF/*.pdf
          if-no-files-found: warn
          retention-days: 30
